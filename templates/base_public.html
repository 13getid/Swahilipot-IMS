<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SwahiliPot IMS{% endblock %}</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {50:'#eff4ff',100:'#dce8ff',200:'#b9d0fe',500:'#3b63d4',600:'#1e40af',700:'#1730a0',900:'#0f1e6b'},
          },
          fontFamily: {
            display: ['"Plus Jakarta Sans"', 'sans-serif'],
            sans: ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>
</head>
<body class="bg-[#f8faff] text-[#374151] font-sans min-h-screen">
  {% block content %}{% endblock %}
</body>
</html>
