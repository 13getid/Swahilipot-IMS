{% extends 'base_public.html' %}

{% block title %}Sign In — SwahiliPot IMS{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-[400px] bg-white rounded-xl shadow-md border border-[#e2e8f0] p-8">

    <div class="text-center mb-6">
      <h1 class="font-display font-bold text-2xl">
        <span class="text-brand-600">Swahili</span><span class="text-[#374151]">Pot</span>
      </h1>
      <p class="text-[11px] text-[#6b7280]">Hub Foundation</p>
      <p class="mt-3 text-sm text-[#6b7280]">Internal Management System</p>
    </div>

    {% if form.non_field_errors %}
      <p class="mb-4 text-sm text-[#dc2626]">Invalid email or password.</p>
    {% endif %}

    <form method="post" class="space-y-4">
      {% csrf_token %}
      <div>
        <label for="id_username" class="block text-sm font-medium mb-1">Email</label>
        <input type="email" name="username" id="id_username" required
               class="w-full h-12 px-3 rounded-lg border border-[#e2e8f0] focus:outline-none focus:ring-2 focus:ring-brand-500">
      </div>
      <div>
        <label for="id_password" class="block text-sm font-medium mb-1">Password</label>
        <input type="password" name="password" id="id_password" required
               class="w-full h-12 px-3 rounded-lg border border-[#e2e8f0] focus:outline-none focus:ring-2 focus:ring-brand-500">
      </div>
      <button type="submit" class="w-full h-12 rounded-lg bg-brand-600 hover:bg-brand-700 text-white font-medium">
        Sign In
      </button>
    </form>

  </div>
</div>
{% endblock %}
