{% extends 'base_public.html' %}
{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-8">
  <div class="w-full max-w-sm bg-white rounded-xl shadow-md border border-[#e2e8f0] p-6 text-center">
    <div class="text-5xl mb-3">✅</div>
    <h1 class="font-display font-bold text-xl">You're checked in!</h1>
    <p class="text-sm text-[#374151] mt-2">{{ record.trainee_name }}</p>
    <p class="text-xs text-[#6b7280] mt-1">Checked in at {{ record.check_in|date:"H:i" }}</p>

    <form method="post" action="{% url 'attend_checkout' session.token record.id %}" class="mt-6">
      {% csrf_token %}
      <button type="submit" class="w-full h-12 rounded-lg border border-brand-600 text-brand-600 font-medium">Check Out</button>
    </form>
  </div>
</div>
{% endblock %}
